<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>离线版生成中心</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .tab-btn { padding: 10px; background: #eee; cursor: pointer; display: inline-block; }
        .tab-btn.active { background: #3498db; color: white; }
        #display-area { margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>🖨️ 生成中心 (离线稳定版)</h2>
    <div id="tabs">
        <span class="tab-btn active" onclick="currentType='user'">👤 员工</span>
        <span class="tab-btn" onclick="currentType='box'">📦 柜子</span>
        <span class="tab-btn" onclick="currentType='item'">🔧 物品</span>
    </div>
    <br><br>
    <input type="text" id="input_id" placeholder="ID/条码" style="width:100%; padding:10px;">
    <br><br>
    <input type="text" id="input_name" placeholder="名称/规格" style="width:100%; padding:10px;">
    <br><br>
    <button onclick="generate()" style="width:100%; padding:12px; background:#2ecc71; color:white;">注册并生成</button>
    
    <div id="display-area">
        <div id="qrcode"></div>
        <svg id="barcode"></svg>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<script>
    let currentType = 'user';
    const GOOGLE_API_URL = '你的Google地址'; // 别忘了替换

    function generate() {
        const id = document.getElementById('input_id').value;
        const name = document.getElementById('input_name').value;
        
        // 1. 生成二维码
        document.getElementById("qrcode").innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {text: id, width: 150, height: 150});
        
        // 2. 生成条形码
        JsBarcode("#barcode", id, {format: "CODE128", width: 2, height: 50});
        
        // 3. 发送给表格
        fetch(GOOGLE_API_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({action: 'REGISTER_ITEM', id: id, name: name})
        }).then(() => alert('提交完成！'));
    }
</script>
</body>
</html>
